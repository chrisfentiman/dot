name: PR

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint & Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Build
        run: cargo build --release

  fuzz:
    name: Fuzz (smoke run)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Build fuzz targets
        run: cargo fuzz build

      - name: fuzz_uri_dispatch (30s)
        run: cargo fuzz run fuzz_uri_dispatch -- -max_total_time=30

      - name: fuzz_expand_tilde (30s)
        run: cargo fuzz run fuzz_expand_tilde -- -max_total_time=30

      - name: fuzz_template_render (30s)
        run: cargo fuzz run fuzz_template_render -- -max_total_time=30

      - name: fuzz_diff (30s)
        run: cargo fuzz run fuzz_diff -- -max_total_time=30

      - name: fuzz_resolve_symlink (30s)
        run: cargo fuzz run fuzz_resolve_symlink -- -max_total_time=30

      - name: fuzz_toml_parse (30s)
        run: cargo fuzz run fuzz_toml_parse -- -max_total_time=30

  mutants:
    name: Mutation testing
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-mutants
        run: cargo install cargo-mutants

      - name: Run mutation testing
        run: cargo mutants --timeout=60 -- --lib

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-report
          path: mutants.out/
