name: CI

on:
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      fuzz: ${{ steps.filter.outputs.fuzz }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            fuzz:
              - 'src/**'
              - 'fuzz/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test

      - name: Build
        run: cargo build --release

  fuzz-build:
    name: Fuzz build
    needs: changes
    if: needs.changes.outputs.fuzz == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Build all targets
        run: cargo fuzz build

      - name: Upload fuzz binaries
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-binaries
          path: fuzz/target/x86_64-unknown-linux-gnu/release/fuzz_*
          retention-days: 1

  fuzz:
    needs: fuzz-build
    if: needs.fuzz-build.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - fuzz_uri_dispatch
          - fuzz_expand_tilde
          - fuzz_template_render
          - fuzz_diff
          - fuzz_resolve_symlink
          - fuzz_toml_parse
          - fuzz_find_dotf_root
          - fuzz_validation
    steps:
      - name: Download fuzz binaries
        uses: actions/download-artifact@v4
        with:
          name: fuzz-binaries

      - name: Run (30s)
        run: |
          chmod +x ${{ matrix.target }}
          ./${{ matrix.target }} -max_total_time=30

  mutants:
    name: Mutation testing
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: mutants-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: mutants-${{ runner.os }}-

      - name: Install cargo-mutants
        run: cargo install cargo-mutants

      - name: Find changed Rust files
        id: changed
        run: |
          files=$(git diff --name-only origin/main...HEAD -- 'src/**/*.rs' | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"
          if [ -z "$files" ]; then
            echo "No Rust source files changed"
          else
            echo "Changed files: $files"
          fi

      - name: Run mutation testing
        if: steps.changed.outputs.files != ''
        run: |
          file_args=""
          for f in ${{ steps.changed.outputs.files }}; do
            file_args="$file_args --file $f"
          done
          cargo mutants -j2 $file_args -- --lib || true

      - name: Summary
        if: always()
        run: |
          if [ ! -f mutants.out/outcome.json ]; then
            echo "No Rust source files changed — mutation testing skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          caught=$(jq '[.outcomes[] | select(.outcome == "CaughtMutant")] | length' mutants.out/outcome.json)
          missed=$(jq '[.outcomes[] | select(.outcome == "MissedMutant")] | length' mutants.out/outcome.json)
          timeout=$(jq '[.outcomes[] | select(.outcome == "Timeout")] | length' mutants.out/outcome.json)
          unviable=$(jq '[.outcomes[] | select(.outcome == "Unviable")] | length' mutants.out/outcome.json)
          total=$((caught + missed + timeout + unviable))

          if [ "$total" -eq 0 ]; then
            echo "No mutants generated from changed files." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          score=$((caught * 100 / (caught + missed)))

          {
            echo "## Mutation Testing Results"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Caught | $caught |"
            echo "| Missed | $missed |"
            echo "| Timeout | $timeout |"
            echo "| Unviable | $unviable |"
            echo "| **Total** | **$total** |"
            echo "| **Score** | **${score}%** |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$missed" -gt 0 ]; then
            {
              echo "<details><summary>Missed mutants ($missed)</summary>"
              echo ""
              echo '```'
              jq -r '.outcomes[] | select(.outcome == "MissedMutant") | "\(.scenario.function // "unknown") — \(.scenario.replacement // "unknown")"' mutants.out/outcome.json
              echo '```'
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-report
          path: mutants.out/

  # Gate job — the single required status check.
  # Passes when: all jobs succeeded, or code jobs were correctly skipped
  # because no code changed (docs-only PR). Fails if any job actually failed.
  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [changes, lint, test, fuzz-build, fuzz, mutants]
    if: always()
    steps:
      - name: Check results
        run: |
          code="${{ needs.changes.outputs.code }}"
          fuzz="${{ needs.changes.outputs.fuzz }}"

          # If no code changed, all code jobs should be skipped — that's fine
          if [ "$code" != "true" ] && [ "$fuzz" != "true" ]; then
            echo "No code/fuzz changes — all checks skipped correctly"
            exit 0
          fi

          # If code changed, lint and test must have passed
          if [ "$code" == "true" ]; then
            if [ "${{ needs.lint.result }}" != "success" ]; then
              echo "Lint failed: ${{ needs.lint.result }}"
              exit 1
            fi
            if [ "${{ needs.test.result }}" != "success" ]; then
              echo "Test failed: ${{ needs.test.result }}"
              exit 1
            fi
          fi

          # If fuzz-relevant files changed, fuzz must have passed
          if [ "$fuzz" == "true" ]; then
            if [ "${{ needs.fuzz-build.result }}" != "success" ]; then
              echo "Fuzz build failed: ${{ needs.fuzz-build.result }}"
              exit 1
            fi
            if [ "${{ needs.fuzz.result }}" != "success" ]; then
              echo "Fuzz run failed: ${{ needs.fuzz.result }}"
              exit 1
            fi
          fi

          # mutants is continue-on-error, so we don't gate on it
          echo "All required checks passed"
