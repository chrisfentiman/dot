name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: rust
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Enable auto-merge
        if: steps.release.outputs.pr
        run: gh pr merge --squash --auto ${{ fromJSON(steps.release.outputs.pr).number }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GH_REPO: ${{ github.repository }}

  build:
    name: Build (${{ matrix.target }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../dotf-${{ matrix.target }}.tar.gz dotf
          cd ../../..
          sha256sum dotf-${{ matrix.target }}.tar.gz > dotf-${{ matrix.target }}.tar.gz.sha256 || shasum -a 256 dotf-${{ matrix.target }}.tar.gz > dotf-${{ matrix.target }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: dotf-${{ matrix.target }}
          path: |
            dotf-${{ matrix.target }}.tar.gz
            dotf-${{ matrix.target }}.tar.gz.sha256

  publish:
    name: Publish release
    needs: [release-please, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          cat *.sha256 > checksums.txt
          cat checksums.txt

      - name: Upload to release
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} artifacts/*.tar.gz artifacts/checksums.txt --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

  update-formula:
    name: Update Homebrew formula
    needs: [release-please, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-dotf
        uses: actions/checkout@v4
        with:
          repository: chrisfentiman/homebrew-dotf
          token: ${{ secrets.DOTF_TAP_TOKEN }}

      - name: Download checksums
        run: gh release download ${{ needs.release-please.outputs.tag_name }} --pattern checksums.txt --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update formula
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/chrisfentiman/dot/releases/download/${TAG}"

          arm_macos_sha=$(grep 'aarch64-apple-darwin' checksums.txt | awk '{print $1}')
          x86_macos_sha=$(grep 'x86_64-apple-darwin' checksums.txt | awk '{print $1}')
          arm_linux_sha=$(grep 'aarch64-unknown-linux-gnu' checksums.txt | awk '{print $1}')
          x86_linux_sha=$(grep 'x86_64-unknown-linux-gnu' checksums.txt | awk '{print $1}')

          cat > Formula/dotf.rb <<FORMULA
          class Dotf < Formula
            desc "Dotfiles manager with pluggable secret injection (pass, op, bw, env)"
            homepage "https://github.com/chrisfentiman/dot"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/dotf-aarch64-apple-darwin.tar.gz"
                sha256 "${arm_macos_sha}"
              elsif Hardware::CPU.intel?
                url "${BASE_URL}/dotf-x86_64-apple-darwin.tar.gz"
                sha256 "${x86_macos_sha}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/dotf-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${arm_linux_sha}"
              elsif Hardware::CPU.intel?
                url "${BASE_URL}/dotf-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${x86_linux_sha}"
              end
            end

            def install
              bin.install "dotf"
            end

            test do
              assert_predicate bin/"dotf", :exist?
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc indentation
          sed -i 's/^          //' Formula/dotf.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dotf.rb
          git commit -m "chore: update dotf to ${VERSION}"
          git push
