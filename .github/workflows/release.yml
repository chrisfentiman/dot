name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: dotf-aarch64-macos
            binary: dotf
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: dotf-x86_64-macos
            binary: dotf
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: dotf-x86_64-linux
            binary: dotf
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: dotf-aarch64-linux
            binary: dotf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}

  update-formula:
    name: Update homebrew-dotf formula
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout homebrew-dotf
        uses: actions/checkout@v4
        with:
          repository: chrisfentiman/homebrew-dotf
          token: ${{ secrets.DOTF_TAP_TOKEN }}

      - name: Compute SHA256s and update formula
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          ARM_URL="https://github.com/chrisfentiman/dot/releases/download/${TAG}/dotf-aarch64-macos"
          X86_URL="https://github.com/chrisfentiman/dot/releases/download/${TAG}/dotf-x86_64-macos"
          ARM_LINUX_URL="https://github.com/chrisfentiman/dot/releases/download/${TAG}/dotf-aarch64-linux"
          X86_LINUX_URL="https://github.com/chrisfentiman/dot/releases/download/${TAG}/dotf-x86_64-linux"

          # Helper: retry until asset is available and non-empty
          fetch_sha() {
            local url="$1" label="$2" sha=""
            for i in {1..10}; do
              sha=$(curl -fsSL -L "$url" | sha256sum | awk '{print $1}')
              [ -n "$sha" ] && [ "$sha" != "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ] && echo "$sha" && return
              echo "Waiting for $label asset... ($i)" >&2
              sleep 15
            done
            echo "ERROR: Could not fetch $label after retries" >&2
            return 1
          }

          ARM_SHA=$(fetch_sha "$ARM_URL" "macOS ARM")
          X86_SHA=$(fetch_sha "$X86_URL" "macOS x86")
          ARM_LINUX_SHA=$(fetch_sha "$ARM_LINUX_URL" "Linux ARM")
          X86_LINUX_SHA=$(fetch_sha "$X86_LINUX_URL" "Linux x86")

          echo "ARM_SHA=$ARM_SHA"
          echo "X86_SHA=$X86_SHA"
          echo "ARM_LINUX_SHA=$ARM_LINUX_SHA"
          echo "X86_LINUX_SHA=$X86_LINUX_SHA"

          printf 'class Dotf < Formula\n' > Formula/dotf.rb
          printf '  desc "Dotfiles manager with pluggable secret injection (pass, op, bw, env)"\n' >> Formula/dotf.rb
          printf '  homepage "https://github.com/chrisfentiman/dot"\n' >> Formula/dotf.rb
          printf '  version "%s"\n' "${VERSION}" >> Formula/dotf.rb
          printf '  license "MIT"\n' >> Formula/dotf.rb
          printf '\n' >> Formula/dotf.rb
          printf '  on_macos do\n' >> Formula/dotf.rb
          printf '    if Hardware::CPU.arm?\n' >> Formula/dotf.rb
          printf '      url "%s"\n' "${ARM_URL}" >> Formula/dotf.rb
          printf '      sha256 "%s"\n' "${ARM_SHA}" >> Formula/dotf.rb
          printf '    elsif Hardware::CPU.intel?\n' >> Formula/dotf.rb
          printf '      url "%s"\n' "${X86_URL}" >> Formula/dotf.rb
          printf '      sha256 "%s"\n' "${X86_SHA}" >> Formula/dotf.rb
          printf '    end\n' >> Formula/dotf.rb
          printf '  end\n' >> Formula/dotf.rb
          printf '\n' >> Formula/dotf.rb
          printf '  on_linux do\n' >> Formula/dotf.rb
          printf '    if Hardware::CPU.arm?\n' >> Formula/dotf.rb
          printf '      url "%s"\n' "${ARM_LINUX_URL}" >> Formula/dotf.rb
          printf '      sha256 "%s"\n' "${ARM_LINUX_SHA}" >> Formula/dotf.rb
          printf '    elsif Hardware::CPU.intel?\n' >> Formula/dotf.rb
          printf '      url "%s"\n' "${X86_LINUX_URL}" >> Formula/dotf.rb
          printf '      sha256 "%s"\n' "${X86_LINUX_SHA}" >> Formula/dotf.rb
          printf '    end\n' >> Formula/dotf.rb
          printf '  end\n' >> Formula/dotf.rb
          printf '\n' >> Formula/dotf.rb
          printf '  def install\n' >> Formula/dotf.rb
          printf '    os = OS.mac? ? "macos" : "linux"\n' >> Formula/dotf.rb
          printf '    arch = Hardware::CPU.arm? ? "aarch64" : "x86_64"\n' >> Formula/dotf.rb
          printf '    binary = "dotf-#{arch}-#{os}"\n' >> Formula/dotf.rb
          printf '    chmod 0755, binary\n' >> Formula/dotf.rb
          printf '    bin.install binary => "dotf"\n' >> Formula/dotf.rb
          printf '  end\n' >> Formula/dotf.rb
          printf '\n' >> Formula/dotf.rb
          printf '  test do\n' >> Formula/dotf.rb
          printf '    assert_predicate bin/"dotf", :exist?\n' >> Formula/dotf.rb
          printf '  end\n' >> Formula/dotf.rb
          printf 'end\n' >> Formula/dotf.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dotf.rb
          git commit -m "chore: update dotf formula to ${VERSION}"
          git push
