name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: dotf-aarch64-macos
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: dotf-x86_64-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/dot ${{ matrix.asset_name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}

  update-formula:
    name: Update hometaps formula
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hometaps
        uses: actions/checkout@v4
        with:
          repository: chrisfentiman/homebrew-hometaps
          token: ${{ secrets.HOMETAPS_TOKEN }}

      - name: Compute SHA256s and update formula
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          ARM_URL="https://github.com/chrisfentiman/dot/releases/download/${TAG}/dotf-aarch64-macos"
          X86_URL="https://github.com/chrisfentiman/dot/releases/download/${TAG}/dotf-x86_64-macos"

          # Retry until assets are available (can lag after job completes)
          for i in {1..10}; do
            ARM_SHA=$(curl -fsSL "$ARM_URL" | sha256sum | awk '{print $1}')
            [ -n "$ARM_SHA" ] && [ "$ARM_SHA" != "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ] && break
            echo "Waiting for ARM asset... ($i)"
            sleep 15
          done

          for i in {1..10}; do
            X86_SHA=$(curl -fsSL "$X86_URL" | sha256sum | awk '{print $1}')
            [ -n "$X86_SHA" ] && [ "$X86_SHA" != "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ] && break
            echo "Waiting for x86 asset... ($i)"
            sleep 15
          done

          if [ -z "$ARM_SHA" ] || [ -z "$X86_SHA" ]; then
            echo "ERROR: Could not fetch release assets after retries"
            exit 1
          fi

          # Write formula using printf to avoid heredoc YAML conflicts
          printf 'class Dot < Formula\n' > Formula/dot.rb
          printf '  desc "Personal dotfiles manager with Proton Pass secret injection"\n' >> Formula/dot.rb
          printf '  homepage "https://github.com/chrisfentiman/dot"\n' >> Formula/dot.rb
          printf '  version "%s"\n' "${VERSION}" >> Formula/dot.rb
          printf '  license "MIT"\n' >> Formula/dot.rb
          printf '\n' >> Formula/dot.rb
          printf '  on_macos do\n' >> Formula/dot.rb
          printf '    if Hardware::CPU.arm?\n' >> Formula/dot.rb
          printf '      url "%s"\n' "${ARM_URL}" >> Formula/dot.rb
          printf '      sha256 "%s"\n' "${ARM_SHA}" >> Formula/dot.rb
          printf '    elsif Hardware::CPU.intel?\n' >> Formula/dot.rb
          printf '      url "%s"\n' "${X86_URL}" >> Formula/dot.rb
          printf '      sha256 "%s"\n' "${X86_SHA}" >> Formula/dot.rb
          printf '    end\n' >> Formula/dot.rb
          printf '  end\n' >> Formula/dot.rb
          printf '\n' >> Formula/dot.rb
          printf '  def install\n' >> Formula/dot.rb
          printf '    arch = Hardware::CPU.arm? ? "aarch64" : "x86_64"\n' >> Formula/dot.rb
          printf '    chmod 0755, "dotf-#{arch}-macos"\n' >> Formula/dot.rb
          printf '    bin.install "dotf-#{arch}-macos" => "dotf"\n' >> Formula/dot.rb
          printf '  end\n' >> Formula/dot.rb
          printf '\n' >> Formula/dot.rb
          printf '  test do\n' >> Formula/dot.rb
          printf '    assert_predicate bin/"dotf", :exist?\n' >> Formula/dot.rb
          printf '  end\n' >> Formula/dot.rb
          printf 'end\n' >> Formula/dot.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dot.rb
          git commit -m "chore: update dot formula to ${VERSION}"
          git push
